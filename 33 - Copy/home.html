<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEGAMA 33</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --charcoal: #1a1a1a;
      --grey: #2e2e2e;
      --white: #f0f0f0;
      --red: #c0001a;
      --silver: #9a9a9a;
    }

    html,
    body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      overflow: hidden;
    }

    /* ── HERO — full viewport, no gaps ── */
    .hero {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Image fills entire screen, cropped nicely from center */
    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      filter: brightness(0.75) contrast(1.05);
    }

    /* gradient: dark at top for legibility, heavy at bottom for UI */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(0, 0, 0, 0.45) 0%,
          transparent 30%,
          transparent 50%,
          rgba(0, 0, 0, 0.7) 78%,
          rgba(0, 0, 0, 0.95) 100%);
    }

    /* ── ORBITAL RING ── */
    .brand-orbit {
      position: absolute;
      top: 40%;
      left: 50%;
      width: 0;
      height: 0;
      pointer-events: none;
      z-index: 5;
    }

    .orbit-ring {
      position: absolute;
      width: clamp(300px, 55vw, 650px);
      height: clamp(70px, 14vw, 140px);
      transform: translate(-50%, -50%) rotateX(66deg);
      transform-style: preserve-3d;
      animation: orbitSpin 8s linear infinite;
    }

    .orbit-track {
      position: absolute;
      inset: 0;
      border: 1.5px solid rgba(192, 0, 26, 0.3);
      border-radius: 50%;
    }

    .orbit-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(-66deg);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.6rem);
      letter-spacing: 0.3em;
      color: var(--white);
      text-shadow: 0 0 30px rgba(192, 0, 26, 0.8), 0 2px 8px rgba(0, 0, 0, 0.95);
      white-space: nowrap;
      user-select: none;
      animation: counterSpin 8s linear infinite;
    }

    .orbit-label span {
      color: var(--red);
    }

    .orbit-label-back {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(180deg) rotateX(-66deg);
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.6rem);
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.12);
      white-space: nowrap;
      user-select: none;
      animation: counterSpin 8s linear infinite;
    }

    @keyframes orbitSpin {
      from {
        transform: translate(-50%, -50%) rotateX(66deg) rotateZ(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotateX(66deg) rotateZ(360deg);
      }
    }

    @keyframes counterSpin {
      from {
        transform: translate(-50%, -50%) rotateX(-66deg) rotateZ(0deg);
      }

      to {
        transform: translate(-50%, -50%) rotateX(-66deg) rotateZ(-360deg);
      }
    }

    /* ── HERO CONTENT ── */
    .hero-content {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      text-align: center;
      width: 100%;
      padding: 0 20px;
    }

    .hero-tagline {
      font-size: clamp(0.7rem, 1.8vw, 0.95rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--silver);
      margin-bottom: 18px;
    }

    /* ── SHOP NOW ── */
    .shop-wrapper {
      position: relative;
      display: inline-block;
    }

    .btn-shop {
      display: inline-block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      letter-spacing: 0.28em;
      color: var(--white);
      background: var(--red);
      border: none;
      padding: 15px 52px;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background 0.2s, transform 0.15s;
    }

    .btn-shop:hover,
    .btn-shop:focus {
      background: #e0001f;
      transform: scaleX(1.04);
      outline: none;
    }

    .btn-shop::after {
      content: '▾';
      margin-left: 10px;
      font-size: 0.8em;
      transition: transform 0.2s;
      display: inline-block;
    }

    .shop-wrapper.open .btn-shop::after {
      transform: rotate(180deg);
    }

    .shop-menu {
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--charcoal);
      border: 1px solid var(--grey);
      border-top: 2px solid var(--red);
      min-width: 220px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 20;
    }

    .shop-wrapper.open .shop-menu {
      opacity: 1;
      pointer-events: all;
      transform: translateX(-50%) translateY(0);
    }

    .shop-menu a {
      display: block;
      padding: 13px 24px;
      color: var(--white);
      text-decoration: none;
      font-size: 0.88rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 600;
      border-bottom: 1px solid var(--grey);
      transition: background 0.15s, padding-left 0.15s;
    }

    .shop-menu a:last-child {
      border-bottom: none;
    }

    .shop-menu a:hover {
      background: var(--red);
      padding-left: 30px;
    }

    /* ── SOCIAL BAR ── */
    .social-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .social-bar a {
      color: var(--silver);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.2s, transform 0.2s;
    }

    .social-bar a:hover {
      color: var(--white);
      transform: translateY(-3px);
    }

    .social-bar svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .social-bar .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--red);
    }

    @media (prefers-reduced-motion: reduce) {

      .orbit-ring,
      .orbit-label {
        animation: none;
      }

      .orbit-label-back {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .hero-content {
        bottom: 90px;
      }

      .social-bar {
        gap: 18px;
      }

      .social-bar .label {
        display: none;
      }
    }
  </style>
</head>

  <script>
    const wrapper = document.getElementById('shopWrapper');
    const btn = document.getElementById('shopBtn');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = wrapper.classList.toggle('open');
      btn.setAttribute('aria-expanded', isOpen);
    });

    document.addEventListener('click', () => {
      wrapper.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        wrapper.classList.remove('open');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
