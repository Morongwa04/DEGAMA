<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery — DEGAMA 33</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --charcoal: #1a1a1a;
            --grey: #2e2e2e;
            --white: #f0f0f0;
            --red: #c0001a;
            --silver: #9a9a9a;
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid var(--grey);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 0.2em;
            color: var(--white);
            text-decoration: none;
        }

        .nav-logo span {
            color: var(--red);
        }

        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }

        .nav-links a {
            color: var(--silver);
            text-decoration: none;
            font-size: 0.78rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--white);
        }

        .nav-links a.active {
            color: var(--white);
            border-bottom: 2px solid var(--red);
            padding-bottom: 2px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--silver);
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            padding: 30px 40px 0;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--white);
        }

        .page-header {
            padding: 50px 40px 10px;
            text-align: center;
        }

        .page-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            letter-spacing: 0.15em;
            line-height: 1;
        }

        .page-header h1 span {
            color: var(--red);
        }

        .page-header p {
            color: var(--silver);
            font-size: 0.82rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .header-line {
            width: 60px;
            height: 2px;
            background: var(--red);
            margin: 14px auto 0;
        }

        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 30px 20px 10px;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--grey);
            color: var(--silver);
            font-family: 'Barlow', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 600;
            padding: 9px 22px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--red);
            color: var(--white);
            border-color: var(--red);
        }

        .gallery-grid {
            columns: 3 280px;
            column-gap: 3px;
            padding: 20px 20px 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 3px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: var(--charcoal);
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-placeholder {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--charcoal);
            color: #3a3a3a;
        }

        .gallery-placeholder.tall {
            height: 380px;
        }

        .gallery-placeholder.med {
            height: 280px;
        }

        .gallery-placeholder.short {
            height: 220px;
        }

        .gallery-placeholder svg {
            width: 40px;
            height: 40px;
            fill: #3a3a3a;
        }

        .gallery-placeholder span {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-item:hover img {
            transform: scale(1.06);
        }

        .overlay-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: var(--white);
        }

        .overlay-tag {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--red);
            font-weight: 600;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.94);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .lightbox.open {
            opacity: 1;
            pointer-events: all;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 88vh;
            object-fit: contain;
            display: block;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 28px;
            font-size: 2.2rem;
            color: var(--silver);
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: var(--red);
        }

        @media (max-width: 600px) {
            nav {
                padding: 16px 20px;
            }

            .nav-links {
                gap: 14px;
            }

            .gallery-grid {
                columns: 2 140px;
            }

            .back-link {
                padding: 20px 20px 0;
            }
        }

        /* quick note: placeholder blocks are easy to replace with <img> */
        .gallery-item img+.gallery-overlay {
            opacity: 0;
        }

        /* overlay only on hover */
    </style>
</head>

    <!-- LIGHTBOX -->

    </div>

    <script>
        // Filter
        function filterGallery(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.gallery-item').forEach(item => {
                if (cat === 'all' || item.dataset.category === cat) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Lightbox – works with any <img> inside .gallery-item
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('click', () => {
                const img = item.querySelector('img');
                if (!img) return;
                document.getElementById('lightboxImg').src = img.src;
                document.getElementById('lightboxImg').alt = img.alt || 'Gallery image';
                document.getElementById('lightbox').classList.add('open');
            });
        });

        document.getElementById('lightboxClose').addEventListener('click', () => {
            document.getElementById('lightbox').classList.remove('open');
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                e.currentTarget.classList.remove('open');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
        });
    </script>
